{% set name = "MetObs-toolkit" %}
{% set version = "1.0.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metobs_toolkit-{{ version }}.tar.gz
  sha256: 3a64da6c14e0e47707d8568a38f74715917966ccf932dc41506f0fa6f23f3b97

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - cartopy >=0.23
    - earthengine-api <=1.6.11
    - geemap >=0.35.3
    - geopandas >=1.0.1
    - mapclassify >=2.8.1
    - matplotlib-base >=3.9.2
    - numpy >=1
    - pandas >=2
    - pint >=0.24.4
    - setuptools >=78.1.0
    - shapely >=2.0.6
    - xarray >=2022.3.0
    - pyarrow >=21.0.0,<22 # The <22 constrains can be removed in >=v1.0.0 of metobs
    - netcdf4 >=1.7.2,<2 # The <2 constrains is copied from metobs requirements

test:
  imports:
    - metobs_toolkit
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: "https://metobs-toolkit.readthedocs.io/en/latest/"
  summary: A Meteorological observations toolkit for scientists
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - vergauwenthomas
    - pratiman-91
