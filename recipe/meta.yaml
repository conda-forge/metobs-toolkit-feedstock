{% set name = "MetObs-toolkit" %}
{% set version = "1.1.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metobs_toolkit-{{ version }}.tar.gz
  sha256: fffa46e9f6c0b66d4ffb736449d0da6eaccdfed5765d7fc8972a7817b540871e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core
    - pip
  run:
    - python >={{ python_min }}
    - cartopy >=0.23, <0.26
    - earthengine-api >=1.6.12, <2.0
    - geemap >=0.36, <0.37 # geemap 0.37.1 has a folium import regression (basemaps.xyz_to_folium)
    - geopandas >=1.0.1, <2.0
    - mapclassify >=2.8.1, <3.0
    - matplotlib-base >=3.9.2, <4.0
    - numpy >=1.26, <3.0
    - pandas >=2.2, <3.0
    - pint >=0.24.4, <1.0
    - shapely >=2.0.6, <3.0
    - xarray >=2022.3.0, <2027.0.0
    - pyarrow >=21.0.0, <22.0.0
    - netcdf4 >=1.7.2, <2.0.0
    - pytz >=2024.1, <2027.1
    - setuptools >=78.1.0
test:
  imports:
    - metobs_toolkit
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: "https://metobs-toolkit.readthedocs.io/en/latest/"
  summary: A Meteorological observations toolkit for scientists
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ADRIE-A3
    - vergauwenthomas
